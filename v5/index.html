<style>

  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; }

  button { font-family:inherit; }
  .app { max-width:980px; margin:0 auto; padding:18px 14px 42px; }
  .hero { background:rgba(255,255,255,.9); border:1px solid var(--line); border-radius:22px; padding:18px; box-shadow:var(--shadow); }

  .tab.active { background:#111827; color:#fff; border-color:#111827; }

  .progress-wrap { margin-bottom:14px; }

  .wrong-title { font-weight:900; line-height:1.45; margin:6px 0; }
  .wrong-answer { color:#065f46; background:#ecfdf5; border:1px solid #a7f3d0; border-radius:10px; padding:8px 10px; font-weight:900; }
  .wrong-meta { color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#111827; color:#fff; padding:10px 14px; border-radius:999px; box-shadow:var(--shadow); display:none; z-index:60; font-weight:800; }

}],"answer":"A","answerTexts":["A. 错误"],"multi":false},{"id":"题6-116","source":"题6","seq":"116","global":716,"type":"判断题","question":"深度学习模型训练中，将学习率设置为0.1，模型快速收敛且稳定，说明学习率越大越好，这种说法是否正确？","options":[{"label":"A","text":"错误"},{"label":"B","text":"正确"}],"answer":"A","answerTexts":["A. 错误"],"multi":false},{"id":"题6-117","source":"题6","seq":"117","global":717,"type":"判断题","question":"在PPT中，你可以将演示文稿另存为PDF格式，这样在不安装Office的电脑上也能播放，但动画效果会丢失。","options":[{"label":"A","text":"错误"},{"label":"B","text":"正确"}],"answer":"B","answerTexts":["B. 正确"],"multi":false},{"id":"题6-118","source":"题6","seq":"118","global":718,"type":"判断题","question":"人工智能训练师的职业道德水平完全取决于公司培训制度的完善程度，与个人努力无关。","options":[{"label":"A","text":"错误"},{"label":"B","text":"正确"}],"answer":"A","answerTexts":["A. 错误"],"multi":false},{"id":"题6-119","source":"题6","seq":"119","global":719,"type":"判断题","question":"在数据预处理中，对于数值型特征的缺失值，总是使用均值填充是最优选择。","options":[{"label":"A","text":"错误"},{"label":"B","text":"正确"}],"answer":"A","answerTexts":["A. 错误"],"multi":false},{"id":"题6-120","source":"题6","seq":"120","global":720,"type":"判断题","question":"数据增强技术只能应用于图像数据，无法应用于文本或语音数据。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":"B","answerTexts":["B. 错误"],"multi":false}]</script>
<script>
const QUESTIONS = JSON.parse(document.getElementById('question-data').textContent);
const KEY = 'quiz-bank-memory-v5-state';
const TOTAL = QUESTIONS.length;
const qIndexById = new Map(QUESTIONS.map((q,i)=>[q.id,i]));
let mode = 'full';
let busy = false;
let selected = new Set();
let state = loadState();

function defaultState() { return { fullIndex:0, wrongs:{}, wrongCursor:0, history:[] }; }
function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return defaultState();
    const s = Object.assign(defaultState(), JSON.parse(raw));
    if (!s.wrongs || typeof s.wrongs !== 'object') s.wrongs = {};
    if (!Number.isFinite(s.fullIndex)) s.fullIndex = 0;
    s.fullIndex = Math.max(0, Math.min(TOTAL, s.fullIndex));
    return s;
  } catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); updateTopStats(); }
function resetAll() { if(confirm('确定清空完整做题进度和错题本吗？')) { state=defaultState(); saveState(); render(); toast('已清空本地进度'); } }
function resetFull() { if(confirm('确定从第一题重新开始完整做题吗？错题本不会清空。')) { state.fullIndex=0; saveState(); render(); } }
function clearWrongs() { if(confirm('确定清空错题本吗？')) { state.wrongs={}; state.wrongCursor=0; saveState(); render(); } }
function pct(n,d) { return d ? Math.round(n*1000/d)/10 : 0; }
function wrongIds() { return Object.keys(state.wrongs).filter(id=>qIndexById.has(id)).sort((a,b)=>qIndexById.get(a)-qIndexById.get(b)); }
function answerTexts(q) { return q.answerTexts && q.answerTexts.length ? q.answerTexts.join('；') : q.answer; }
function normalizeAnswer(arr) { return [...new Set(arr)].sort().join(''); }
function updateTopStats() {
  document.getElementById('wrongCountTop').textContent = wrongIds().length;
  document.getElementById('progressTop').textContent = pct(state.fullIndex,TOTAL) + '%';
}
function setMode(m) { mode=m; busy=false; selected.clear(); document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===m)); render(); }
document.querySelectorAll('.tab[data-mode]').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));

function progressHtml(current, total, label='完整进度') {
  const done = Math.min(current,total), remain=Math.max(0,total-done), p=pct(done,total);
  return `<div class="progress-wrap"><div class="progress-info"><b>${label}：已完成 ${done} / ${total}</b><span>剩余 ${remain} 题 · ${p}%</span></div><div class="bar"><span style="width:${p}%"></span></div></div>`;
}
function render() {
  selected.clear(); busy=false; updateTopStats();
  if (mode==='full') renderFull();
  else if (mode==='wrongbook') renderWrongbook();
  else renderWrongQuiz();
}

function renderFull() {
  const panel=document.getElementById('panel');
  if (state.fullIndex >= TOTAL) {
    panel.innerHTML = `<section class="card">${progressHtml(TOTAL,TOTAL)}<div class="empty"><h2>🎉 完整做题已完成</h2><p>你已经从第一题做到最后一题。当前错题本还有 <b>${wrongIds().length}</b> 题。</p><div class="actions"><button class="smallbtn primary" onclick="setMode('wrongquiz')">进入错题模式</button><button class="smallbtn" onclick="setMode('wrongbook')">查看错题本</button><button class="smallbtn danger" onclick="resetFull()">重新完整做题</button></div></div></section>`;
    return;
  }
  const q=QUESTIONS[state.fullIndex];
  panel.innerHTML = `<section class="card">${progressHtml(state.fullIndex,TOTAL)}${questionHtml(q,'full')}<div class="actions"><button class="smallbtn danger" onclick="resetFull()">重置完整进度</button><button class="smallbtn danger" onclick="resetAll()">清空全部缓存</button></div></section>`;
}
function renderWrongQuiz() {
  const ids=wrongIds(); const panel=document.getElementById('panel');
  if (!ids.length) {
    panel.innerHTML = `<section class="card"><div class="empty"><h2>✅ 错题已清空</h2><p>错题本里没有题。可以先完整做题，答错后会自动加入错题本。</p><div class="actions"><button class="smallbtn primary" onclick="setMode('full')">去完整做题</button></div></div></section>`;
    return;
  }
  state.wrongCursor = ((state.wrongCursor || 0) % ids.length + ids.length) % ids.length;
  const q=QUESTIONS[qIndexById.get(ids[state.wrongCursor])];
  const done = Math.max(0, TOTAL - ids.length), p = pct(done,TOTAL);
  panel.innerHTML = `<section class="card"><div class="progress-wrap"><div class="progress-info"><b>错题模式：当前错题 ${ids.length} 题</b><span>答对即移出；全部清空后结束</span></div><div class="bar"><span style="width:${p}%"></span></div></div>${questionHtml(q,'wrongquiz')}<div class="actions"><button class="smallbtn" onclick="setMode('wrongbook')">查看错题本</button><button class="smallbtn danger" onclick="clearWrongs()">清空错题本</button></div></section>`;
}
function renderWrongbook() {
  const ids=wrongIds(); const panel=document.getElementById('panel');
  if (!ids.length) {
    panel.innerHTML = `<section class="card"><div class="empty"><h2>📘 错题本为空</h2><p>完整做题时答错的题会自动保存到这里。</p><div class="actions"><button class="smallbtn primary" onclick="setMode('full')">开始/继续完整做题</button></div></div></section>`;
    return;
  }
  const cards = ids.map(id=>{
    const q=QUESTIONS[qIndexById.get(id)], w=state.wrongs[id]||{};
    return `<article class="wrong-card"><div class="wrong-meta"><span>${q.id}</span><span>${q.type}</span><span>错 ${w.count||1} 次</span>${w.lastUserAnswer?`<span>上次选：${escapeHtml(w.lastUserAnswer)}</span>`:''}</div><div class="wrong-title">${escapeHtml(q.question)}</div><div class="wrong-answer">正确答案：${escapeHtml(answerTexts(q))}</div><div class="actions"><button class="smallbtn" onclick="removeWrong('${q.id}')">移出错题本</button></div></article>`;
  }).join('');
  panel.innerHTML = `<section class="card"><div class="progress-info"><b>错题本：${ids.length} 题</b><span>这里直接显示正确答案</span></div><div class="actions"><button class="smallbtn primary" onclick="setMode('wrongquiz')">开始错题模式</button><button class="smallbtn danger" onclick="clearWrongs()">清空错题本</button></div><div class="wrong-list">${cards}</div></section>`;
}
function questionHtml(q, context) {
  const opt = q.options.map(o=>`<button class="option" data-label="${o.label}" onclick="chooseOption('${o.label}','${context}')"><span class="letter">${o.label}</span><span class="otext">${escapeHtml(o.text)}</span></button>`).join('');
  const tip = q.multi ? '多选题：选完后点“提交答案”' : '点击选项后自动判断并快速切到下一题';
  return `<div class="qhead"><div class="badges"><span class="badge dark">${q.id}</span><span class="badge soft">总第 ${q.global} 题</span><span class="badge type">${q.type}</span></div><div class="mode-tip">${tip}</div></div><div class="question">${escapeHtml(q.question)}</div><div class="options">${opt}</div>${q.multi?`<div class="multi-actions"><span class="hint">已选：<b id="selectedText">未选择</b></span><button class="submit" id="submitBtn" onclick="submitMulti('${context}')" disabled>提交答案</button></div>`:''}`;
}
function chooseOption(label, context) {
  if (busy) return;
  const q = context==='full' ? QUESTIONS[state.fullIndex] : QUESTIONS[qIndexById.get(wrongIds()[state.wrongCursor])];
  if (!q) return;
  if (q.multi) {
    if (selected.has(label)) selected.delete(label); else selected.add(label);
    document.querySelectorAll('.option').forEach(btn=>btn.classList.toggle('selected', selected.has(btn.dataset.label)));
    const st=document.getElementById('selectedText'), sb=document.getElementById('submitBtn');
    if (st) st.textContent = selected.size ? normalizeAnswer(selected) : '未选择';
    if (sb) sb.disabled = selected.size===0;
    return;
  }
  evaluate(q, [label], context);
}
function submitMulti(context) {
  if (busy || selected.size===0) return;
  const q = context==='full' ? QUESTIONS[state.fullIndex] : QUESTIONS[qIndexById.get(wrongIds()[state.wrongCursor])];
  evaluate(q, [...selected], context);
}
function evaluate(q, labels, context) {
  busy=true;
  const userAns=normalizeAnswer(labels), ok = userAns === normalizeAnswer(q.answer.split(''));
  document.querySelectorAll('.option').forEach(btn=>{
    btn.classList.add('disabled');
    const lab=btn.dataset.label;
    if (q.answer.includes(lab)) btn.classList.add('correct','pulse-correct');
    if (labels.includes(lab) && !q.answer.includes(lab)) btn.classList.add('wrong','shake');
  });
  if (ok) { flash('good','✓ 答对了'); } else { flash('bad','正确：' + answerTexts(q)); addWrong(q,userAns); }
  state.history.push({id:q.id, ok, userAns, at:Date.now(), mode:context});
  if (state.history.length>100) state.history=state.history.slice(-100);
  const delay = ok ? 420 : 780;
  setTimeout(()=>{
    if (context==='full') { state.fullIndex = Math.min(TOTAL, state.fullIndex + 1); }
    else {
      if (ok) removeWrong(q.id, false);
      const ids=wrongIds();
      if (ids.length) state.wrongCursor = ok ? Math.min(state.wrongCursor, ids.length-1) : (state.wrongCursor + 1) % ids.length;
      else state.wrongCursor = 0;
    }
    saveState(); render();
  }, delay);
}
function addWrong(q,userAns) {
  const old=state.wrongs[q.id]||{count:0};
  state.wrongs[q.id]={count:(old.count||0)+1,lastUserAnswer:userAns,lastWrongAt:Date.now()};
}
function removeWrong(id, rerender=true) { delete state.wrongs[id]; saveState(); if(rerender) render(); }
function flash(kind,text) { const f=document.getElementById('flash'); f.className='result-flash '+kind+' show'; f.textContent=text; setTimeout(()=>{f.className='result-flash';},650); }
function toast(text) { const t=document.getElementById('toast'); t.textContent=text; t.className='toast show'; setTimeout(()=>t.className='toast',950); }
function escapeHtml(s) { return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

updateTopStats(); render();
</script>
</body>
</html>
